plugins {
    id 'java-library'
    id 'eclipse'
}

sourceSets {
    main {
        java {
            srcDirs = []
        }
    }
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    api fileTree(dir: 'libs', include: ['*.jar'])
}

